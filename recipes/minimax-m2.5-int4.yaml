# Recipe: MiniMax-M2.5-int4-AutoRound
# MiniMax M2.5 model with int4-AutoRound quantization

recipe_version: "1"
name: MiniMax-M2.5-int4-AutoRound
description: vLLM serving MiniMax-M2.5-int4-AutoRound with Ray distributed backend

# HuggingFace model to download (optional, for --download-model)
model: Intel/MiniMax-M2.5-int4-AutoRound

# Container image to use
container: vllm-node-tf5

build_args:
  - --tf5

# Can only be run in a cluster
cluster_only: true

# No mods required
mods:
  - mods/fix-qwen3.5-autoround
  - mods/fix-qwen3.5-chat-template
  - mods/minimax-m2.5

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.7
  max_model_len: 196608

# Environment variables
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: 1

# The vLLM serve command template
command: |
  vllm serve Intel/MiniMax-M2.5-int4-AutoRound \
      --trust-remote-code \
      --port {port} \
      --host {host} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      -tp {tensor_parallel} \
      --distributed-executor-backend ray \
      --max-model-len {max_model_len} \
      --load-format fastsafetensors \
      --enable-auto-tool-choice \
      --interleave-mm-strings \
      --tokenizer /minimax-m2.5-tokenizer \
      --chat-template /minimax-m2.5-tokenizer/chat_template.jinja \
      --tool-call-parser minimax_m2 \
      --reasoning-parser minimax_m2
